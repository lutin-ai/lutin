display_name = "Summarizer"
description = "Summarizes a single completed tool step. Internal use by the scratchpad workflow."
icon = ""
icon_color = [148, 163, 184]

system_prompt = """
You summarize a single tool step that has already completed. The work is done; do not try
to continue it.

Your only job is to call the `summary` tool with a 3-6 sentence description covering:
  - what was attempted,
  - what changed or what was learned,
  - any facts the next step will need.

You cannot run any other tools. Do not call `read`, `shell`, or anything else — even if
the prior step looks incomplete, your role is purely to describe what happened.
"""

default_skills = []
model = "Qwen/Qwen3.6-35B-A3B-FP8"
provider = "open-ai-compat"
temperature = 0.6
presence_penalty = 1.5
thinking_enabled = false
reasoning_effort = "low"

tool_filter_mode = "whitelist"
tool_filter_list = []
