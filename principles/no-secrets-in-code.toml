title = "No secrets in code, logs, or arguments"
description = '''
Block any tool call that puts a real secret into source code, a test
fixture, a log line, an error message, a commit, or an argv string.
"Secret" means anything that grants access if leaked: API keys,
OAuth tokens, session cookies, JWTs, database URLs with embedded
passwords, private keys, signing keys, webhook secrets, cloud
provider credentials, SSH keys, `Authorization: Bearer …` literals,
`.env` contents, anything copied from a credentials file.

The cost of a leaked secret is asymmetric: it gets indexed by
GitHub search within minutes of pushing, and rotation across a real
deployment is hours of work. The agent does not get to "I'll redact
it later."

## Why

- Source files get committed, pushed, and mirrored. Once a secret
  hits git history, removing it requires rewriting history on every
  clone — usually nobody bothers, so the secret stays reachable.
- Logs and error messages get shipped to centralized log stores,
  shared in bug reports, pasted into chat. A secret in an error
  string fans out to wherever the error fans out to.
- Command-line arguments (`curl -H "Authorization: Bearer sk-…"`)
  appear in shell history, process lists, and audit logs.
- Test fixtures with "real-looking" credentials get copy-pasted
  into production code by the next person who needs an example.

## Apply

Block when the proposed change introduces, into a file or command:
- A string that matches a known secret shape: `sk-…`, `ghp_…`,
  `xoxb-…`, `AKIA…`, `-----BEGIN … PRIVATE KEY-----`, JWT-shaped
  three-segment base64, long random hex/base64 in an obvious
  credential context (`api_key = "…"`, `password = "…"`, headers).
- The contents of a `.env`, `~/.aws/credentials`, `~/.ssh/id_*`,
  `~/.netrc`, `~/.kube/config`, or similar credentials file pasted
  inline.
- A `Bearer …`, `Basic …`, or `?api_key=…` literal in argv when an
  env var or file would do.
- A connection string with an embedded password
  (`postgres://user:pw@host/db`).
- A new log/print/error-message that interpolates a variable named
  like `*_key`, `*_secret`, `*_token`, `password`, `auth`,
  `credentials`, without redaction.

Pass when:
- The string is an obvious placeholder (`YOUR_API_KEY`,
  `sk-REPLACEME`, `xxx`, `<token>`, `***`).
- The credential is clearly a test fixture in a test file and is
  marked as such (a comment saying so, or a value like
  `"test-secret-do-not-use"` that no real system would accept).
- The code reads the secret from env/file at runtime — the *name*
  of a config key (`OPENAI_API_KEY`) is fine, the *value* is not.

## Verdict guidance

- "rethink" — committing a real-looking secret to a tracked file.
  Pop the frame; the right path is env var or secret manager.
- "fix" — secret in argv or log message that should be a env-var
  read or a redacted form. Re-issue with the safer shape.
- "nit" — secret-shaped placeholder that could be more clearly
  marked as fake.
'''

persona = "reviewer"
applies_to = ["edit", "edit_lines", "write", "shell", "http_request"]
context = ["tool_call", "tool_artifact", "chat"]
max_retries = 1
on_max_retries = "ask_user"
